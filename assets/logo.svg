<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="react-xray logo">
  <title>react-xray</title>
  <rect width="256" height="256" rx="40" fill="#0B1220"/>

  <!-- Faded React-style orbits -->
  <g transform="translate(128 128)" fill="none" stroke="#22D3EE" stroke-width="3" opacity="0.35">
    <ellipse rx="84" ry="32"/>
    <ellipse rx="84" ry="32" transform="rotate(60)"/>
    <ellipse rx="84" ry="32" transform="rotate(120)"/>
  </g>

  <!-- Scan line / x-ray pulse -->
  <rect x="20" y="120" width="216" height="16" fill="#22D3EE" opacity="0.08"/>

  <!-- Bold X mark on top -->
  <g stroke="#22D3EE" stroke-width="14" stroke-linecap="round" fill="none">
    <line x1="72" y1="72" x2="184" y2="184"/>
    <line x1="184" y1="72" x2="72" y2="184"/>
  </g>

  <!-- Nucleus -->
  <circle cx="128" cy="128" r="10" fill="#0B1220"/>
  <circle cx="128" cy="128" r="6" fill="#22D3EE"/>
</svg>
